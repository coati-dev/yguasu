<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piano</title>

  <body>
    <div id="app">
      <header>

      <main>
        <div id="keyboard-container"></div>

    </div>

    <script type="module" src="/src/main.js"></script>
